openapi: 3.0.3
info:
  title: RustChain Node API
  description: |
    Official API documentation for RustChain decentralized computing network nodes.

    **RustChain** is a proof-of-antiquity blockchain that rewards vintage hardware owners with RTC tokens.

    ## Authentication

    Most endpoints are public and require no authentication. Admin endpoints require an `X-Admin-Key` header.

    ## Rate Limiting

    Public endpoints are rate-limited to 100 requests/minute per IP.

    ## Base URL

    ```
    https://rustchain.org/api
    ```

    ## Getting Help

    - GitHub: https://github.com/Scottcjn/Rustchain
    - Discord: [RustChain Community]
  version: 2.2.1-rip200
  contact:
    name: RustChain Team
    url: https://github.com/Scottcjn/Rustchain/issues
  license:
    name: MIT
    url: https://github.com/Scottcjn/Rustchain/blob/master/LICENSE

servers:
  - url: https://rustchain.org
    description: Production node
  - url: http://localhost:5000
    description: Local development node

tags:
  - name: Health
    description: Node health and status checks
  - name: Epoch
    description: Epoch and slot information
  - name: Miners
    description: Miner enrollment and data
  - name: Balance
    description: Wallet balance queries
  - name: Stats
    description: Network statistics
  - name: Hall of Fame
    description: Leaderboards and achievements
  - name: Fees
    description: RIP-301 fee pool information
  - name: Explorer
    description: Block explorer endpoints
  - name: Withdrawals
    description: Withdrawal operations
  - name: Admin
    description: Administrative operations (requires auth)
  - name: Attestation
    description: Hardware attestation submissions

paths:
  /health:
    get:
      tags:
        - Health
      summary: Node health check
      description: Returns the current node status and version
      operationId: getHealth
      responses:
        '200':
          description: Node is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                ok: true
                version: "2.2.1-rip200"
                uptime_s: 20426
                db_rw: true
                tip_age_slots: 0
                backup_age_hours: 3.08

  /ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Kubernetes-style readiness check
      operationId: getReady
      responses:
        '200':
          description: Node is ready to accept requests
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /epoch:
    get:
      tags:
        - Epoch
      summary: Get current epoch info
      description: Returns the current epoch number, slot, and enrolled miners
      operationId: getEpoch
      responses:
        '200':
          description: Epoch information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpochResponse'
              example:
                epoch: 91
                slot: 13164
                epoch_pot: 1.5
                enrolled_miners: 19
                blocks_per_epoch: 144
                total_supply_rtc: 8388608

  /api/miners:
    get:
      tags:
        - Miners
      summary: Get active miners
      description: Returns list of currently enrolled miners with attestation data
      operationId: getMiners
      parameters:
        - name: limit
          in: query
          description: Maximum number of miners to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: List of active miners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MinerInfo'
              example:
                - miner: "RTC1d48d848a5aa5ecf2c5f01aa5fb64837daaf2f35"
                  device_arch: "M4"
                  device_family: "Apple Silicon"
                  hardware_type: "Apple Silicon (Modern)"
                  antiquity_multiplier: 1.2
                  entropy_score: 0
                  last_attest: 1772605548
                  first_attest: null

  /api/stats:
    get:
      tags:
        - Stats
      summary: Get network statistics
      description: Returns aggregate network statistics
      operationId: getStats
      responses:
        '200':
          description: Network statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkStats'
        '404':
          description: Endpoint not implemented in this version

  /api/hall_of_fame:
    get:
      tags:
        - Hall of Fame
      summary: Get Hall of Fame leaderboard
      description: Returns top miners across 5 categories
      operationId: getHallOfFame
      parameters:
        - name: category
          in: query
          description: Leaderboard category
          schema:
            type: string
            enum: [oldest, highest_score, most_attestations, richest, longest_running]
            default: oldest
      responses:
        '200':
          description: Leaderboard entries (may be null if not implemented)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallOfFameResponse'

  /api/fee_pool:
    get:
      tags:
        - Fees
      summary: Get RIP-301 fee pool statistics
      description: Returns current fee pool balance and distribution
      operationId: getFeePool
      responses:
        '200':
          description: Fee pool statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeePoolResponse'
              example:
                description: "Fee Pool Statistics (fees recycled to mining pool)"
                rip: 301
                destination: "founder_community"
                destination_balance_rtc: 83246.131299
                total_fees_collected_rtc: 0
                total_fee_events: 0
                withdrawal_fee_rtc: 0.01
                fees_by_source: {}
                recent_events: []

  /balance:
    get:
      tags:
        - Balance
      summary: Get miner balance
      description: Query RTC balance for a specific miner
      operationId: getBalance
      parameters:
        - name: miner_id
          in: query
          required: true
          description: Miner public key or ID
          schema:
            type: string
          example: "dual-g4-125"
      responses:
        '200':
          description: Miner balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '404':
          description: Miner not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /lottery/eligibility:
    get:
      tags:
        - Epoch
      summary: Check epoch eligibility
      description: Check if a miner is eligible for current epoch rewards
      operationId: getEligibility
      parameters:
        - name: miner_id
          in: query
          required: true
          description: Miner public key or ID
          schema:
            type: string
      responses:
        '200':
          description: Eligibility status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EligibilityResponse'

  /explorer:
    get:
      tags:
        - Explorer
      summary: Block explorer page
      description: Returns HTML page for block explorer
      operationId: getExplorer
      responses:
        '200':
          description: HTML explorer page
          content:
            text/html:
              schema:
                type: string

  /attest/submit:
    post:
      tags:
        - Attestation
      summary: Submit hardware attestation
      description: Submit hardware attestation proof for enrollment
      operationId: submitAttestation
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttestationSubmit'
      responses:
        '200':
          description: Attestation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttestationResponse'
        '400':
          description: Invalid attestation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wallet/transfer/signed:
    post:
      tags:
        - Admin
      summary: Submit signed wallet transfer
      description: Submit an Ed25519-signed wallet transfer
      operationId: submitSignedTransfer
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignedTransfer'
      responses:
        '200':
          description: Transfer submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          description: Invalid transfer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wallet/transfer:
    post:
      tags:
        - Admin
      summary: Admin wallet transfer
      description: Execute an administrative wallet transfer (requires admin key)
      operationId: adminTransfer
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminTransfer'
      responses:
        '200':
          description: Transfer executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '401':
          description: Invalid admin key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /withdraw/request:
    post:
      tags:
        - Withdrawals
      summary: Request withdrawal
      description: Request a withdrawal to an external address
      operationId: requestWithdrawal
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalRequest'
      responses:
        '200':
          description: Withdrawal request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawalResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API key for authenticated requests
    AdminKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Admin key for administrative operations

  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          description: True if node is operational
        version:
          type: string
          description: Node version
          example: "2.2.1-rip200"
        uptime_s:
          type: integer
          description: Uptime in seconds
        db_rw:
          type: boolean
          description: True if database is writable
        tip_age_slots:
          type: integer
          description: Age of chain tip in slots
        backup_age_hours:
          type: number
          format: float
          description: Age of latest backup in hours

    EpochResponse:
      type: object
      properties:
        epoch:
          type: integer
          description: Current epoch number
        slot:
          type: integer
          description: Current slot number
        epoch_pot:
          type: number
          format: float
          description: RTC rewards available this epoch
        enrolled_miners:
          type: integer
          description: Number of enrolled miners
        blocks_per_epoch:
          type: integer
          description: Slots per epoch
        total_supply_rtc:
          type: number
          format: float
          description: Total RTC supply

    MinerInfo:
      type: object
      properties:
        miner:
          type: string
          description: Miner public key (RTC-prefixed)
        device_arch:
          type: string
          description: Device architecture
          example: "M4"
        device_family:
          type: string
          description: Device family/category
          example: "Apple Silicon"
        hardware_type:
          type: string
          description: Hardware type description
        antiquity_multiplier:
          type: number
          format: float
          description: Reward multiplier based on hardware age
        entropy_score:
          type: number
          format: float
          description: Hardware entropy score (0-1)
        last_attest:
          type: integer
          format: int64
          description: Unix timestamp of last attestation
        first_attest:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp of first attestation

    NetworkStats:
      type: object
      properties:
        total_miners:
          type: integer
        total_attestations:
          type: integer
        active_miners:
          type: integer
        current_epoch:
          type: integer
        network_hashrate:
          type: string
          description: Hashrate with units
        total_machines:
          type: integer

    HallOfFameResponse:
      type: object
      properties:
        category:
          type: string
          description: Leaderboard category
        entries:
          type: array
          items:
            type: object
            properties:
              rank:
                type: integer
              miner_id:
                type: string
              value:
                type: number
                description: Raw score/value
              display_value:
                type: string
                description: Human-readable value

    FeePoolResponse:
      type: object
      properties:
        description:
          type: string
          description: Human-readable description
        rip:
          type: integer
          description: RIP number
          example: 301
        destination:
          type: string
          description: Fee pool destination address
        destination_balance_rtc:
          type: number
          format: float
          description: Balance at destination
        total_fees_collected_rtc:
          type: number
          format: float
          description: Total fees collected
        total_fee_events:
          type: integer
          description: Number of fee events
        withdrawal_fee_rtc:
          type: number
          format: float
          description: Fee per withdrawal
        fees_by_source:
          type: object
          additionalProperties:
            type: number
          description: Fees broken down by source
        recent_events:
          type: array
          items:
            type: object
          description: Recent fee events

    BalanceResponse:
      type: object
      properties:
        miner_id:
          type: string
        balance_rtc:
          type: number
          format: float
        unconfirmed_rtc:
          type: number
          format: float
          description: Unconfirmed/pending balance
        pending_withdrawals_rtc:
          type: number
          format: float
          description: Amount pending withdrawal

    EligibilityResponse:
      type: object
      properties:
        eligible:
          type: boolean
        epoch:
          type: integer
        enrolled:
          type: boolean
        reason:
          type: string
          description: Explanation of eligibility status

    AttestationSubmit:
      type: object
      required:
        - miner_id
        - device_arch
        - entropy_score
        - signature
        - pubkey
      properties:
        miner_id:
          type: string
        device_arch:
          type: string
          description: Claimed device architecture
        entropy_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        signature:
          type: string
          description: Base64-encoded Ed25519 signature
        pubkey:
          type: string
          description: Ed25519 public key

    AttestationResponse:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, rejected, pending]
        epoch:
          type: integer
        enrolled:
          type: boolean
        reward_multiplier:
          type: number
          format: float
          description: Multiplier based on hardware antiquity

    SignedTransfer:
      type: object
      required:
        - from_pubkey
        - to_pubkey
        - amount_rtc
        - fee_rtc
        - nonce
        - signature
      properties:
        from_pubkey:
          type: string
          description: Sender's Ed25519 public key
        to_pubkey:
          type: string
          description: Recipient's Ed25519 public key
        amount_rtc:
          type: number
          format: float
          minimum: 0
        fee_rtc:
          type: number
          format: float
          minimum: 0
        nonce:
          type: integer
          description: Transaction nonce for replay protection
        signature:
          type: string
          description: Ed25519 signature

    AdminTransfer:
      type: object
      required:
        - from_pubkey
        - to_pubkey
        - amount_rtc
      properties:
        from_pubkey:
          type: string
        to_pubkey:
          type: string
        amount_rtc:
          type: number
          format: float

    TransferResponse:
      type: object
      properties:
        status:
          type: string
          enum: [submitted, completed, failed]
        tx_id:
          type: string
          description: Transaction ID
        from_balance:
          type: number
          format: float
        to_balance:
          type: number
          format: float

    WithdrawalRequest:
      type: object
      required:
        - miner_id
        - destination_address
        - amount_rtc
        - signature
      properties:
        miner_id:
          type: string
        destination_address:
          type: string
          description: External wallet address
        amount_rtc:
          type: number
          format: float
          minimum: 0
        signature:
          type: string
          description: Ed25519 signature authorizing withdrawal

    WithdrawalResponse:
      type: object
      properties:
        withdrawal_id:
          type: string
          description: Unique withdrawal identifier
        status:
          type: string
          enum: [pending, processing, completed, rejected]
        amount_rtc:
          type: number
          format: float
        estimated_completion:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
        details:
          type: object
          description: Additional error details
          additionalProperties: true
      required:
        - error
